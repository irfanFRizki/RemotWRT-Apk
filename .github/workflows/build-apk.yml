name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

permissions:
  contents: write   # needed to create the GitHub Release below

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # `if:` conditions can't reference `secrets.*` directly (GitHub Actions
      # restriction) -- routing it through a job-level env var first works
      # around that, since `env.*` IS allowed in `if:`.
      HAS_SIGNING: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.7

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: RemotWRTBot-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      # Decodes the RELEASE_KEYSTORE_BASE64 secret (see README for how to
      # generate/add it) into a real .keystore file, and exposes its path +
      # passwords as env vars that app/build.gradle.kts reads to sign the
      # release build. If the secret isn't configured yet, this step is
      # skipped and the release build below falls back to being unsigned
      # (matches the previous behavior) -- the in-app updater just won't
      # have anything newer to offer until signing is set up.
      - name: Decode release keystore
        if: ${{ env.HAS_SIGNING == 'true' }}
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > "${{ runner.temp }}/release.keystore"
          echo "RELEASE_KEYSTORE_PATH=${{ runner.temp }}/release.keystore" >> "$GITHUB_ENV"
          echo "RELEASE_KEYSTORE_PASSWORD=${{ secrets.RELEASE_KEYSTORE_PASSWORD }}" >> "$GITHUB_ENV"
          echo "RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }}" >> "$GITHUB_ENV"
          echo "RELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}" >> "$GITHUB_ENV"

      # versionCode = this workflow run's number, so it's always increasing
      # and always matches the release tag (vN) below -- the Android app
      # compares its own BuildConfig.VERSION_CODE against that tag to decide
      # whether an update is available.
      - name: Build signed release APK
        run: gradle assembleRelease -PverCode=${{ github.run_number }} --no-daemon

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: RemotWRTBot-release-apk
          path: app/build/outputs/apk/release/app-release*.apk

      # Publishes (or overwrites) a GitHub Release tagged vN with the signed
      # release APK attached -- this is what the app's in-app updater polls
      # via the GitHub API and downloads from.
      - name: Publish GitHub Release
        if: ${{ env.HAS_SIGNING == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: RemotWRT Bot v${{ github.run_number }}
          files: app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true